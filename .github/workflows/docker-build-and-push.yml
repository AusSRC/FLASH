name: Build and Push Docker Image

on:
  push:
    branches: [ "FLASH-75-Swap-to-using-Nginx-ansible-docker" ] # Triggers on push to my branch

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
      
          echo "VERSION=$VERSION"
      
          if [ -z "$VERSION" ]; then
            echo "VERSION is empty - failing build"
            exit 1
          fi
      
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v7

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: | 
            aussrc/flash_gui:latest
            aussrc/flash_gui:${{ env.VERSION }}
            aussrc/flash_gui:${{ github.sha }}

      - name: Deploy to DEV_VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_VM_HOST }}
          username: ${{ secrets.DEV_VM_USER }}
          key: ${{ secrets.DEV_VM_SSH_KEY }}
          script: "/usr/local/bin/deploy.sh ${{ env.VERSION }}"