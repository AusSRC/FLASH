services:
  web:
    build: .
    restart: always
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - local_docker_envs.env
    command: gunicorn flashdb.wsgi:application --bind 0.0.0.0:8000

  nginx:
    image: nginx:stable-alpine
    restart: always
    pull_policy: always
    ports:
      - "80:80"
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - ./nginx-local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  media_data:
  static_data: