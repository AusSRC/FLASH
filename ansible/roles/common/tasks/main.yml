# roles/common/tasks/main.yml
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade system
  apt:
    upgrade: dist

- name: Install base packages
  apt:
    name:
      - curl
      - git
      - ufw
      - ca-certificates
      - gnupg
      - lsb-release
    state: present