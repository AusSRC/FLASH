# roles/nginx/tasks/main.yml
- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Ensure nginx default site is removed
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: restart nginx

- name: Enable nginx
  service:
    name: nginx
    enabled: yes
    state: started

- name: Validate nginx config
  command: nginx -t
  changed_when: false